spring.application.name=token
# 1. Database Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/library_db
spring.datasource.username=postgres
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Hibernate DDL Automation
# 'update' means Hibernate will inspect your Java @Entity classes
# and automatically create or modify the SQL tables to match them on startup.
spring.jpa.hibernate.ddl-auto=update

# 3. SQL Logging & Debugging (Crucial for learning!)
# This prints every single SQL query Hibernate runs behind the scenes to your IntelliJ console.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true